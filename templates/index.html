<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>GainPesa | Digital Finance Ecosystem</title>
    <meta name="description" content="GainPesa is a secure platform to earn money online and receive payments instantly via M-Pesa. Fast, reliable and easy to use.">

    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/gainpesa.png') }}?v=3">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/gainpesa.png') }}?v=2">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        
        :root {
            --brand-yellow: #facc15;
            --bg-dark: #050505;
        }

        body {
            background: var(--bg-dark);
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }

        /* Ambient Background Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.4;
            pointer-events: none;
        }
        .orb-yellow { width: 400px; height: 400px; background: var(--brand-yellow); top: -10%; right: -5%; }
        .orb-purple { width: 500px; height: 500px; background: #7c3aed; bottom: -10%; left: -10%; opacity: 0.15; }

        /* Premium Glassmorphism */
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(30px) saturate(160%);
            -webkit-backdrop-filter: blur(30px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.7);
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease;
        }
        
        .stat-item:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-primary {
            background: var(--brand-yellow);
            box-shadow: 0 10px 20px -5px rgba(250, 204, 21, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-primary:hover {
            background: #eab308;
            transform: scale(1.02);
            box-shadow: 0 15px 25px -5px rgba(250, 204, 21, 0.4);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6">

    <div class="orb orb-yellow"></div>
    <div class="orb orb-purple"></div>

    <main class="w-full max-w-4xl flex flex-col md:flex-row items-center gap-8 md:gap-12">
        
        <section class="flex flex-row md:flex-col gap-4 w-full md:w-auto order-2 md:order-1">
            <div class="stat-item flex-1 md:w-40 p-5 rounded-2xl text-center">
                <p id="usersCount" class="text-yellow-400 text-xl font-extrabold">0</p>
                <p class="text-gray-500 text-[9px] uppercase tracking-widest font-bold mt-1">Active Users</p>
            </div>

            <div class="stat-item flex-1 md:w-40 p-5 rounded-2xl text-center">
                <p class="text-yellow-400 text-xl font-extrabold">99.9%</p>
                <p class="text-gray-500 text-[9px] uppercase tracking-widest font-bold mt-1">Uptime</p>
            </div>

            <div class="stat-item flex-1 md:w-40 p-5 rounded-2xl text-center">
                <p class="text-yellow-400 text-xl font-extrabold">4.9/5</p>
                <p class="text-gray-500 text-[9px] uppercase tracking-widest font-bold mt-1">Trust Score</p>
            </div>
        </section>

        <section class="glass-card w-full max-w-md rounded-[3rem] p-10 md:p-14 text-center order-1 md:order-2">
            
            <div class="relative inline-block mb-6">
                <img src="{{ url_for('static', filename='images/gainpesa.png') }}" 
                     alt="GainPesa Logo"
                     class="w-24 h-24 rounded-full object-cover border-2 border-white/10 p-1 bg-black/20">
                <div class="absolute -bottom-2 -right-2 bg-yellow-400 text-black text-[10px] px-2 py-1 rounded-full font-black">
                    V2.0
                </div>
            </div>

            <h1 class="text-5xl font-black italic tracking-tighter mb-2">
                GAIN<span class="text-yellow-400">PESA</span>
            </h1>

            <div class="flex items-center justify-center gap-2 mb-8">
                <span class="h-[1px] w-8 bg-white/10"></span>
                <p class="text-gray-400 text-[10px] uppercase font-bold tracking-[0.3em]">
                    Premium Fintech Solutions
                </p>
                <span class="h-[1px] w-8 bg-white/10"></span>
            </div>

            <div class="space-y-6 mb-10">
                <h2 class="text-xl font-bold text-white">
                    Smart Earning for the <br> <span class="text-yellow-400">Digital Generation</span>
                </h2>
                <p class="text-gray-400 text-sm leading-relaxed px-4">
                    Experience the future of online income. Secure, transparent, and built for speed with instant M-Pesa settlements.
                </p>
            </div>

            <div class="flex flex-col gap-4">
                <a href="/register" class="block w-full">
                    <button class="btn-primary w-full text-black font-extrabold py-4 rounded-2xl uppercase tracking-widest text-xs">
                        Get Started Now
                    </button>
                </a>

                <a href="/login" class="block w-full">
                    <button class="w-full border border-white/10 text-white font-bold py-4 rounded-2xl hover:bg-white/5 transition-all duration-300 uppercase tracking-widest text-xs">
                        Account Login
                    </button>
                </a>
            </div>

            <div class="mt-8 pt-8 border-t border-white/5 flex items-center justify-center gap-4 text-gray-500">
                <div class="flex items-center gap-1.5">
                    <i class="fa-solid fa-shield-halved text-[10px]"></i>
                    <span class="text-[9px] font-bold uppercase tracking-tighter">SSL Secured</span>
                </div>
                <div class="flex items-center gap-1.5">
                    <i class="fa-solid fa-bolt text-[10px]"></i>
                    <span class="text-[9px] font-bold uppercase tracking-tighter">Instant Pay</span>
                </div>
            </div>

        </section>
    </main>

    <script>
        function animateK(id, start, end, duration, suffix = "") {
            const el = document.getElementById(id);
            if(!el) return;
            
            let startTime = null;

            function step(timestamp) {
                if (!startTime) startTime = timestamp;
                let progress = timestamp - startTime;
                let percentage = Math.min(progress / duration, 1);
                
                // Easing function for smoother finish
                let easedProgress = 1 - Math.pow(1 - percentage, 3); 
                let value = Math.floor(easedProgress * (end - start) + start);

                if (value >= 1000) {
                    el.innerText = (value / 1000).toFixed(1) + "K" + suffix;
                } else {
                    el.innerText = value + suffix;
                }

                if (progress < duration) {
                    requestAnimationFrame(step);
                } else {
                    // Final value check
                    el.innerText = (end / 1000).toFixed(0) + "K" + suffix;
                }
            }
            requestAnimationFrame(step);
        }

        // Initialize animations on load
        window.addEventListener('DOMContentLoaded', () => {
            animateK("usersCount", 0, 350000, 2500, "+");
        });
    </script>
</body>
</html>
